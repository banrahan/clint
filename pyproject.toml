[project]
name = "auto-test-tool"
version = "0.1.0"
description = "Automated testing tool for azd ai agent init interactive flows"
requires-python = ">=3.10"
dependencies = [
    "pexpect>=4.9",
    "pyyaml>=6.0",
    "rich>=13.0",
]

[project.scripts]
azd-auto-test = "auto_test_tool.runner:main"
azd-auto-agent = "auto_test_tool.agent:main"

[tool.setuptools.packages.find]
include = ["auto_test_tool*"]
