name: "copilot-hello-world"
# Drive an interactive Copilot CLI session and ask it to create a simple
# hello world Python file. Smoke test for "can we run Copilot inside the
# tester and have it carry out a basic file-creation task".
#
# `--allow-all-tools` is required for non-interactive automation so Copilot
# doesn't stop and prompt for shell/file permissions; `--add-dir` scopes
# file access to the per-instance working directory.
command: "copilot --allow-all-tools --add-dir {cwd}"
cwd: "/tmp/copilot-hello-{instance}"

pre:
  - run: "rm -rf /tmp/copilot-hello-{instance} && mkdir -p /tmp/copilot-hello-{instance}"
    cwd: "/tmp"
    name: "prepare working dir"

goals:
  - "Wait for the Copilot prompt to be ready (look for the input box)."
  - >
    Send the input: "Create a file called hello.py in the current directory
    that prints 'Hello, world!' when run. Just create the file and stop."
  - "Wait for Copilot to report that hello.py was created."
  - "Verify the file exists and prints the expected output by running
     `python3 hello.py` in a separate shell (host side), confirming the
     output is 'Hello, world!'."
  - "Exit the Copilot session cleanly (Ctrl-C or /exit)."
  - "Take a screenshot of the final terminal state."

post:
  - run: "ls -la /tmp/copilot-hello-{instance}"
    name: "list resulting files"
    continue_on_error: true
  - run: "rm -rf /tmp/copilot-hello-{instance}"
    name: "cleanup working dir"
    continue_on_error: true
