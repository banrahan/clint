# Scenario: 01-basic sample README walkthrough
#
# Follow the README as a new user, reporting any confusing UX or dead ends:
#   https://github.com/microsoft/foundry-samples/blob/main/samples/python/hosted-agents/agent-framework/responses/01-basic/README.md

name: "sample-01-basic"
command: "azd ai agent init -m https://github.com/microsoft/foundry-samples/blob/main/samples/python/hosted-agents/agent-framework/responses/01-basic/agent.manifest.yaml"
cwd: "~/working/agents/sample-01-basic"

env:
  AZD_DISABLE_AGENT_DETECT: "1"

notes: |
  'azd ai agent run' blocks the terminal. To test locally you nee two sessions: one running the agent and a second to run
  'azd ai agent invoke --local'. Use start_session with different session_id values to manage both.

goals:
  - "Follow the 01-basic README end-to-end. Use the 'benhanrahan' subscription and 'East US 2' region. Report any confusing prompts, doc mismatches, or dead ends along the way."
  - "Clean up all Azure resources when done (azd down --force --purge)."
