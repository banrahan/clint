# Scenario: Reproduce azure-dev#8523 — azd ai agent init fails when run from sample directory
#
# Bug:  https://github.com/Azure/azure-dev/issues/8523
# Fix:  https://github.com/Azure/azure-dev/pull/8522
#
# When running `azd ai agent init` from INSIDE a directory that already contains
# an agent.manifest.yaml (like a cloned foundry-samples directory), the auto-detect
# flow finds the manifest and guides through setup. But then `ensureProject` creates
# a project subdirectory under CWD, and the subsequent copy step detects that the
# target is inside the manifest directory and rejects it:
#
#   cannot copy agent files: target is inside the manifest directory
#
# This only triggers Case 4 (manifest in CWD + no azure.yaml anywhere in tree).
#
# Repro path:
#   foundry-samples/samples/python/hosted-agents/agent-framework/responses/01-basic/
#   - contains agent.manifest.yaml
#   - no azure.yaml in directory tree
#
# EXPECTED (with fix): init completes, files are copied correctly
# BROKEN (without fix): error "cannot copy agent files: target is inside the manifest directory"
#
# The scenario first clones the sample repo if not already present, then runs
# init from inside the manifest directory.

name: "repro-8523-init-from-manifest-in-cwd"
command: "bash -c 'git clone https://github.com/microsoft-foundry/foundry-samples /tmp/foundry-samples-8523 --depth=1 && cd /tmp/foundry-samples-8523/samples/python/hosted-agents/agent-framework/responses/01-basic && azd ai agent init'"
cwd: "/tmp"

goals:
  # Setup: clone happens as part of the command, then cd into the 01-basic sample dir
  - "Wait for the git clone to complete and for azd ai agent init to start"

  # The auto-detect prompt — MUST say Yes to trigger the bug
  - "When prompted 'An existing agent manifest was found. Use it?' (or similar), select YES — this is what triggers the bug path"

  # Agent name
  - "When prompted for an agent name, enter 'agent-framework-agent-basic-responses' or accept the default"

  # Deployment type
  - "When asked how to deploy, select 'Container Image (Docker)'"

  # Foundry project
  - "When asked to select a Foundry project, choose 'Create a new Foundry project'"

  # Subscription
  - "If asked to select a subscription, search for and select the 'benhanrahan' subscription"

  # Location
  - "If asked for a location, select 'East US 2'"

  # Model
  - "When asked about model selection, accept defaults (gpt-4.1-mini, default version, Standard SKU, capacity 10, default deployment name)"

  # Container size
  - "If asked for container/resource size, accept the default (0.5 cores / 1Gi)"

  # OBSERVE: does it error or succeed?
  - >
    CRITICAL: Watch for either outcome:
    (A) ERROR: 'cannot copy agent files: target ... is inside the manifest directory' — this is the BUG reproducing
    (B) SUCCESS: init completes with 'AI agent definition added' — the fix is working.
    Report which one occurred and include the exact error message if (A).

  # No Azure resources are provisioned in this scenario — it fails at init time
  - "Do NOT run azd provision or azd deploy. This scenario only tests the init step."

  # Cleanup
  - "Run 'rm -rf /tmp/foundry-samples-8523' to clean up the cloned repo. No Azure resources were provisioned."
