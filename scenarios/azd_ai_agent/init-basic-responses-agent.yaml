# Scenario: Init Basic Responses agent → deploy → modify for vacation planning
#
# Task 1: Build and deploy a simple "basic responses" hosted agent (Python).
# Task 2: Modify it into a vacation planner with web search (Bing grounding).
#
# Based on the hosted agents quickstart:
#   https://learn.microsoft.com/en-us/azure/foundry/agents/quickstarts/quickstart-hosted-agent
#
# Parallel-ready: pass ``instance_id`` to ``start_session`` (and any matching
# run/invoke sessions) so each parallel run gets its own ``{agent}`` port
# and its own ``cwd`` (via the auto-injected ``{instance}`` variable).
#
# Single-instance usage works unchanged — ``instance_id`` defaults to "main".

name: "init-basic-responses-agent"
command: "azd ai agent init"
cwd: "~/working/agents/basic-responses-test-{instance}"

# Reserve a port per instance for the local `azd ai agent run` later in the flow,
# so `run` and `invoke --local` in the same instance share it.
allocate_ports: [agent]

env:
  AZD_DISABLE_AGENT_DETECT: "1"

goals:
  # --- Task 1: Build and deploy ---

  # Init mode
  - "When asked how to initialize, select 'Start new from a template'"

  # Language
  - "Select Python as the language"

  # Template — pick 'Basic Responses' (the simple conversational agent)
  - "Select the 'Basic Responses' template from the list"

  # Deployment mode
  - "When asked how to deploy, select 'Container' (hosted agent)"

  # Azure Foundry project
  - "If asked to select an Azure AI Foundry project, create one and follow prompts to create one."

  # Subscription
  - "If asked to select a subscription, search for and select the 'benhanrahan' subscription, if you can't find that subscription take a screenshot and exit"

  # Region / location
  - "If asked for a location or region, select 'East US 2'"

  # Model selection
  - "When asked to select a model, choose 'gpt-4.1-mini' (cheaper and faster for testing)"

  # Model version — accept default
  - "If asked for a model version, accept the default"

  # Model SKU — accept default
  - "If asked for a model SKU, accept the default"

  # Model capacity
  - "If asked for model capacity, enter '10' or accept the default"

  # Model deployment name — accept default
  - "If asked for a model deployment name, accept the default (press Enter)"

  # Container size
  - "If asked for container/resource size, select 'Small'"

  # Wait for init to complete
  - "Wait for initialization to complete — look for 'Next:' or 'SUCCESS' in the output"

  # Take a screenshot of the final state
  - "Take a screenshot of the completed init output"

  # Verify the generated project
  - "Verify the init succeeded by checking that azure.yaml exists in the output directory and contains the expected settings: gpt-4.1-mini model, Standard SKU, capacity 10, 0.5 CPU / 1Gi memory, and docker language"

  # provision the agent after init
  - "once init is done figure out how to provision the agent"

  # run the agent locally on the per-instance allocated port
  - "Open a new start_session (session_id='run-{instance}', same scenario_path,
     same instance_id='{instance}') with command:
       azd ai agent run --port {agent} --no-inspector"

  # invoke the agent locally on the same port
  - "Open another start_session (session_id='invoke-{instance}', same scenario_path,
     same instance_id='{instance}') with command:
       azd ai agent invoke --local --port {agent} 'hello'"

  # do an azd down to clean up
  - "do an azd down to clean up"

